services:
  - type: web
    name: frostbitten-api
    runtime: node
    rootDir: backend
    plan: starter
    autoDeploy: true
    buildCommand: npm install && npm run prisma:generate
    startCommand: npm run prisma:migrate && npm run start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: frostbitten-postgres
          property: connectionString
      - key: PORT
        value: 10000
      - key: CORS_ORIGIN
        sync: false
      - key: JOBS_SECRET
        generateValue: true

  - type: cron
    name: frostbitten-recompute
    runtime: node
    rootDir: backend
    schedule: "*/30 * * * *"
    buildCommand: npm install
    startCommand: node -e "fetch('https://frostbitten-api.onrender.com/jobs/recompute',{method:'POST',headers:{'Authorization':'Bearer '+process.env.JOBS_SECRET}}).then(r=>r.text()).then(console.log).catch(console.error)"
    envVars:
      - key: JOBS_SECRET
        sync: false

databases:
  - name: frostbitten-postgres
    databaseName: frostbitten
    user: frostbitten_user
    plan: free
